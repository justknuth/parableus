name: Deploy to Firebase on merge
on:
  push:
    branches:
      - main
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      # 1. Build the Frontend
      - name: Install and Build Frontend
        run: npm ci && npm run build
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}

      # 2. Authenticate Google Cloud for CLI operations
      - id: 'auth'
        name: 'Authenticate to Google Cloud'
        uses: 'google-github-actions/auth@v2'
        with:
          credentials_json: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_PARABLEUS }}'

      # 3. Deploy the Backend Functions
      - name: Install Firebase CLI and Deploy Functions
        run: |
          npm install -g firebase-tools
          firebase deploy --only functions --project parableus

      # 4. Deploy the Frontend Hosting
      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_PARABLEUS }}
          channelId: live
          projectId: parableus